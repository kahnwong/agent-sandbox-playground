name: Docker Build
on:
  push:
    branches: [master]
    paths:
      - 'setup/**'
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  REGISTRY: ghcr.io
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute git short SHA
        run: echo "GIT_SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
      - name: Normalize image owner
        run: echo "IMAGE_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: Build and push images with bake
        uses: docker/bake-action@v5
        with:
          files: docker-bake.hcl
          targets: default
          push: true
          set: |
            *.cache-from=type=gha,scope=buildx-${{ github.ref_name }}
            *.cache-to=type=gha,mode=max,scope=buildx-${{ github.ref_name }}
            sandbox-router.tags=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/sandbox-router:${{ env.GIT_SHORT_SHA }}
            sandbox-template.tags=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/sandbox-template:${{ env.GIT_SHORT_SHA }}
