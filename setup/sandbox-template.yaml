apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  # The test_client.py expects the template to have this name
  name: sandbox-template # VARIABLE
  namespace: default # VARIABLE
spec:
  podTemplate:
    spec:
      # Optional: uncomment one of the lines below to enable sandbox isolation.
      # runtimeClassName: gvisor      # gVisor (see examples/quickstart/gvisor.md)
      # runtimeClassName: kata-qemu   # Kata Containers (see examples/quickstart/kata-containers.md)
      containers:
        - name: base-runtime
          image: ghcr.io/kahnwong/sandbox-template:2a4f234
          ports:
            - containerPort: 8888
          readinessProbe:
            httpGet:
              path: "/"
              port: 8888
            initialDelaySeconds: 0
            periodSeconds: 1
          livenessProbe:
            httpGet:
              path: "/"
              port: 8888
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
      restartPolicy: "OnFailure"
